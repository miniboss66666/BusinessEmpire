<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BusinessEmpire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/business.css">
  <link rel="stylesheet" href="css/realestate.css">
  <link rel="stylesheet" href="css/stock.css">
  <link rel="stylesheet" href="css/phone.css">
  <link rel="stylesheet" href="css/casino.css">
  <link rel="stylesheet" href="css/underground.css">
  <link rel="stylesheet" href="css/knowledge.css">
  <link rel="stylesheet" href="css/profile.css">
</head>
<body>

  <!-- ===== AUTH SCREEN ===== -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-bg"></div>
    <div class="auth-container">

      <div class="auth-title">
        <span class="title-main">BUSINESS</span>
        <span class="title-sub">EMPIRE</span>
      </div>

      <!-- Mobile tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Đăng Nhập</button>
        <button class="auth-tab" data-tab="register">Đăng Ký</button>
      </div>

      <!-- Desktop: 2 cột / Mobile: 2 tab -->
      <div class="auth-panels">

        <!-- ĐĂNG NHẬP -->
        <div class="auth-panel" id="panel-login">
          <h2>Đăng Nhập</h2>
          <input type="email" id="login-email" placeholder="Email" autocomplete="email"/>
          <input type="password" id="login-password" placeholder="Mật khẩu" autocomplete="current-password"/>
          <div class="forgot-pw" id="forgot-pw">Quên mật khẩu?</div>
          <button class="btn-primary" id="btn-login">ĐĂNG NHẬP</button>
          <div class="auth-divider"><span>hoặc</span></div>
          <button class="btn-oauth google" id="btn-google-login">🔵 Đăng nhập với Google</button>
          <button class="btn-oauth discord" id="btn-discord-login">💜 Đăng nhập với Discord</button>
        </div>

        <!-- ĐĂNG KÝ -->
        <div class="auth-panel" id="panel-register">
          <h2>Đăng Ký</h2>
          <input type="email" id="reg-email" placeholder="Email" autocomplete="email"/>
          <input type="password" id="reg-password" placeholder="Mật khẩu" autocomplete="new-password"/>
          <input type="password" id="reg-confirm" placeholder="Xác nhận mật khẩu" autocomplete="new-password"/>
          <div id="turnstile-container"></div>
          <button class="btn-primary" id="btn-register">ĐĂNG KÝ</button>
          <div class="auth-divider"><span>hoặc</span></div>
          <button class="btn-oauth google" id="btn-google-reg">🔵 Đăng ký với Google</button>
          <button class="btn-oauth discord" id="btn-discord-reg">💜 Đăng ký với Discord</button>
        </div>

      </div>
    </div>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div id="game-screen" class="game-screen hidden">

    <!-- NAV 9 NÚT -->
    <nav id="main-nav">
      <button class="nav-btn" data-page="underground">
        <span class="nav-icon">🌑</span>
        <span class="nav-label">Underground</span>
      </button>
      <button class="nav-btn" data-page="casino">
        <span class="nav-icon">🎰</span>
        <span class="nav-label">Casino</span>
      </button>
      <button class="nav-btn" data-page="realestate">
        <span class="nav-icon">🏢</span>
        <span class="nav-label">BĐS</span>
      </button>
      <button class="nav-btn" data-page="stock">
        <span class="nav-icon">📈</span>
        <span class="nav-label">Stock</span>
      </button>
      <button class="nav-btn active home-btn" data-page="home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-btn" data-page="business">
        <span class="nav-icon">💼</span>
        <span class="nav-label">Business</span>
      </button>
      <button class="nav-btn" data-page="phone">
        <span class="nav-icon">📱</span>
        <span class="nav-label">Phone</span>
      </button>
      <button class="nav-btn" data-page="knowledge">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Knowledge</span>
      </button>
      <button class="nav-btn" data-page="profile">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
      </button>
    </nav>

    <!-- PAGE CONTAINER -->
    <main id="page-container">
      <div id="page-home"        class="page active"></div>
      <div id="page-business"    class="page hidden"></div>
      <div id="page-realestate"  class="page hidden"></div>
      <div id="page-stock"       class="page hidden"></div>
      <div id="page-phone"       class="page hidden"></div>
      <div id="page-casino"      class="page hidden"></div>
      <div id="page-underground" class="page hidden"></div>
      <div id="page-knowledge"   class="page hidden"></div>
      <div id="page-profile"     class="page hidden"></div>
    </main>

  </div>

  <!-- ===== GLOBAL MODALS ===== -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box"></div>
  </div>

  <!-- ===== SCRIPTS ===== -->
  <!-- Thư viện ngoài -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Core -->
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/format.js"></script>
  <script src="js/state.js"></script>

  <script src="js/save.js"></script>

  <!-- Auth -->
  <script src="js/auth.js"></script>

  <!-- UI & Nav -->
  <script src="js/nav.js"></script>
  <script src="js/ui.js"></script>

  <!-- Pages -->
  <script src="js/pages/home.js"></script>
  <script src="js/pages/business/lemonade.js"></script>
  <script src="js/pages/business/market.js"></script>
  <script src="js/pages/business/transport.js"></script>
  <script src="js/pages/business/index.js"></script>
  <script src="js/pages/realestate/data.js"></script>
  <script src="js/pages/realestate/index.js"></script>
  <script src="js/pages/stock/market.js"></script>
  <script src="js/pages/stock/crypto.js"></script>
  <script src="js/pages/stock/miner.js"></script>
  <script src="js/pages/stock/index.js"></script>
  <script src="js/pages/phone/y.js"></script>
  <script src="js/pages/phone/tubeyou.js"></script>
  <script src="js/pages/phone/team.js"></script>
  <script src="js/pages/phone/assets.js"></script>
  <script src="js/pages/phone/index.js"></script>
  <script src="js/pages/casino/slots.js"></script>
  <script src="js/pages/casino/blackjack.js"></script>
  <script src="js/pages/casino/roulette.js"></script>
  <script src="js/pages/casino/baccarat.js"></script>
  <script src="js/pages/casino/dice.js"></script>
  <script src="js/pages/casino/football.js"></script>
  <script src="js/pages/casino/horse.js"></script>
  <script src="js/pages/casino/index.js"></script>
  <script src="js/pages/underground/hack.js"></script>
  <script src="js/pages/underground/plant.js"></script>
  <script src="js/pages/underground/printer.js"></script>
  <script src="js/pages/underground/laundry.js"></script>
  <script src="js/pages/underground/index.js"></script>

  <!-- Knowledge: index.js TRƯỚC branch.js -->
  <script src="js/pages/knowledge/index.js"></script>
  <script src="js/pages/knowledge/social/branch.js"></script>
  <script src="js/pages/knowledge/social/IS1.js"></script>
  <script src="js/pages/knowledge/knowledge/branch.js"></script>
  <script src="js/pages/knowledge/underground/branch.js"></script>
  <script src="js/pages/knowledge/business/branch.js"></script>
  <script src="js/pages/knowledge/casino/branch.js"></script>
  <script src="js/pages/knowledge/realestate/branch.js"></script>
  <script src="js/pages/knowledge/soon/branch.js"></script>
  <!-- Node files khác được autoLoadNodes() inject runtime khi cần -->

  <script src="js/pages/profile.js"></script>

  <!-- Admin & Redeem -->
  <script src="js/admin.js"></script>
  <script src="js/redeem.js"></script>

  <!-- Khởi động -->
  <script src="js/main.js"></script>

</body>
</html>
